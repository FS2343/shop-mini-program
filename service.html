<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="通用商城 - 联系客服">
  <title>联系客服</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .service-page{padding-top:100px;padding-bottom:120px}
    .service-section{background:#fff;margin:20px;border-radius:16px;overflow:hidden}
    .service-item{display:flex;align-items:center;padding:30px;border-bottom:1px solid #f5f5f5}
    .service-item:last-child{border-bottom:none}
    .service-icon{width:80px;height:80px;background:#f5f5f5;border-radius:50%;margin-right:20px;display:flex;align-items:center;justify-content:center;font-size:40px;flex-shrink:0}
    .service-info{flex:1}
    .service-name{font-size:28px;color:#333;font-weight:bold;margin-bottom:8px}
    .service-desc{font-size:24px;color:#999}
    .service-arrow{font-size:28px;color:#ccc}
    .service-time{font-size:22px;color:#999;margin-top:8px}
    .service-hot{background:#fff;margin:20px;border-radius:16px;padding:30px}
    .hot-title{font-size:28px;color:#333;font-weight:bold;margin-bottom:20px}
    .hot-item{font-size:26px;color:#666;padding:16px 0;border-bottom:1px solid #f5f5f5;cursor:pointer}
    .hot-item:last-child{border-bottom:none}
    .hot-item::before{content:'Q: ';color:#ff6034}
  </style>
</head>
<body>
  <div class="page-header"><a href="user.html" class="back-btn">←</a><div class="page-title">联系客服</div><div style="width:60px"></div></div>
  <div class="service-page">
    <div class="service-section">
      <div class="service-item" onclick="callService()">
        <div class="service-icon">📞</div>
        <div class="service-info">
          <div class="service-name">电话客服</div>
          <div class="service-desc">400-xxx-xxxx</div>
          <div class="service-time">服务时间: 9:00-18:00</div>
        </div>
        <div class="service-arrow">></div>
      </div>
      <div class="service-item" onclick="openChat()">
        <div class="service-icon">💬</div>
        <div class="service-info">
          <div class="service-name">在线客服</div>
          <div class="service-desc">点击开始在线咨询</div>
        </div>
        <div class="service-arrow">></div>
      </div>
    </div>
    <div class="service-hot">
      <div class="hot-title">常见问题</div>
      <div class="hot-item" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display?'none':'block'">如何查看订单物流？</div>
      <div style="padding:20px;background:#f5f5f5;margin-bottom:16px;display:none;font-size:24px;color:#666">答：进入“我的订单”，点击对应订单即可查看物流信息。</div>
      <div class="hot-item" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display?'none':'block'">如何申请退款？</div>
      <div style="padding:20px;background:#f5f5f5;margin-bottom:16px;display:none;font-size:24px;color:#666">答：进入订单详情，点击“申请退款”，填写退款原因即可。</div>
      <div class="hot-item" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display?'none':'block'">如何修改收货地址？</div>
      <div style="padding:20px;background:#f5f5f5;margin-bottom:16px;display:none;font-size:24px;color:#666">答：进入“我的-收货地址”，点击编辑即可修改。</div>
    </div>
  </div>
  <script src="app.js"></script>
  <script>
    function callService(){if(confirm('即将拨打客服电话：400-xxx-xxxx')){alert('客服电话：400-xxx-xxxx')}}
    function openChat(){alert('在线客服功能开发中，请稍后...')}
  </script>
</body>
</html>
