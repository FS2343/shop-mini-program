<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="通用商城 - 写评价">
  <title>写评价</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .write-page { padding-top: 100rpx; padding-bottom: 140rpx; background: #f5f5f5; }
    .write-card { background: #fff; margin: 20rpx; border-radius: 16rpx; overflow: hidden; }
    .write-header { display: flex; padding: 30rpx; border-bottom: 1rpx solid #f5f5f5; }
    .write-img { width: 160rpx; height: 160rpx; background: #f5f5f5; border-radius: 12rpx; margin-right: 20rpx; display: flex; align-items: center; justify-content: center; font-size: 60rpx; flex-shrink: 0; }
    .write-info { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
    .write-name { font-size: 26rpx; color: #333; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .write-spec { font-size: 22rpx; color: #999; margin-top: 8rpx; }
    .rating-section { padding: 30rpx; border-bottom: 1rpx solid #f5f5f5; }
    .rating-title { font-size: 26rpx; color: #333; margin-bottom: 20rpx; }
    .rating-stars { display: flex; }
    .rating-star { font-size: 56rpx; color: #ccc; margin-right: 12rpx; cursor: pointer; transition: transform 0.2s; }
    .rating-star:hover { transform: scale(1.2); }
    .rating-star.active { color: #ffcc00; }
    .rating-desc { font-size: 24rpx; color: #999; margin-top: 16rpx; }
    .content-section { padding: 30rpx; border-bottom: 1rpx solid #f5f5f5; }
    .content-textarea { width: 100%; height: 240rpx; background: #f5f5f5; border: none; border-radius: 16rpx; padding: 24rpx; font-size: 26rpx; color: #333; resize: none; box-sizing: border-box; }
    .content-tip { font-size: 22rpx; color: #999; margin-top: 12rpx; text-align: right; }
    .images-section { padding: 30rpx; border-bottom: 1rpx solid #f5f5f5; }
    .images-title { font-size: 26rpx; color: #333; margin-bottom: 20rpx; }
    .images-list { display: flex; flex-wrap: wrap; }
    .image-item { width: 160rpx; height: 160rpx; background: #f5f5f5; border-radius: 12rpx; margin-right: 16rpx; margin-bottom: 16rpx; display: flex; align-items: center; justify-content: center; font-size: 60rpx; position: relative; overflow: hidden; }
    .image-item.add { border: 2rpx dashed #ddd; background: #fafafa; }
    .image-item .remove { position: absolute; top: -10rpx; right: -10rpx; width: 36rpx; height: 36rpx; background: rgba(0,0,0,0.6); color: #fff; border-radius: 50%; font-size: 24rpx; display: flex; align-items: center; justify-content: center; }
    .anonymous-row { display: flex; align-items: center; justify-content: space-between; padding: 30rpx; }
    .anonymous-label { font-size: 26rpx; color: #333; }
    .anonymous-toggle { width: 100rpx; height: 52rpx; background: #ddd; border-radius: 26rpx; position: relative; transition: background 0.3s; }
    .anonymous-toggle.active { background: #07c160; }
    .anonymous-toggle::after { content: ''; position: absolute; top: 4rpx; left: 4rpx; width: 44rpx; height: 44rpx; background: #fff; border-radius: 50%; transition: left 0.3s; }
    .anonymous-toggle.active::after { left: calc(100rpx - 48rpx); }
    .submit-bar { position: fixed; bottom: 0; left: 0; right: 0; max-width: 750rpx; padding: 20rpx 30rpx; padding-bottom: calc(20rpx + env(safe-area-inset-bottom)); background: #fff; box-shadow: 0 -2rpx 10rpx rgba(0,0,0,0.05); }
    .submit-btn { width: 100%; height: 88rpx; background: linear-gradient(135deg, #ff6034, #ff8a34); color: #fff; border: none; border-radius: 44rpx; font-size: 32rpx; font-weight: bold; }
    .submit-btn:disabled { background: #ccc; }
  </style>
</head>
<body>
  <div class="page-header"><a href="order.html" class="back-btn">←</a><div class="page-title">商品评价</div><div style="width:60rpx"></div></div>
  
  <div class="write-page">
    <div class="write-card">
      <div class="write-header">
        <div class="write-img">🍎</div>
        <div class="write-info">
          <div class="write-name">新鲜红富士苹果 5斤装</div>
          <div class="write-spec">已选: 5斤装</div>
        </div>
      </div>
      
      <div class="rating-section">
        <div class="rating-title">商品评分</div>
        <div class="rating-stars">
          <span class="rating-star active" onclick="setRating(1, this)">⭐</span>
          <span class="rating-star active" onclick="setRating(2, this)">⭐</span>
          <span class="rating-star active" onclick="setRating(3, this)">⭐</span>
          <span class="rating-star active" onclick="setRating(4, this)">⭐</span>
          <span class="rating-star active" onclick="setRating(5, this)">⭐</span>
        </div>
        <div class="rating-desc" id="ratingDesc">非常满意</div>
      </div>
      
      <div class="content-section">
        <textarea class="content-textarea" id="reviewContent" placeholder="分享购物体验,说说哪里好(至少10个字)" oninput="checkContent()"></textarea>
        <div class="content-tip"><span id="contentLength">0</span>/500</div>
      </div>
      
      <div class="images-section">
        <div class="images-title">上传图片(选填)</div>
        <div class="images-list">
          <div class="image-item">📷<span class="remove" onclick="removeImage(this)">×</span></div>
          <div class="image-item">📷<span class="remove" onclick="removeImage(this)">×</span></div>
          <div class="image-item add" onclick="addImage()">+</div>
        </div>
      </div>
      
      <div class="anonymous-row">
        <span class="anonymous-label">匿名评价</span>
        <div class="anonymous-toggle active" id="anonymousToggle" onclick="toggleAnonymous()"></div>
      </div>
    </div>
  </div>
  
  <div class="submit-bar">
    <button class="submit-btn" id="submitBtn" onclick="submitReview()" disabled>提交评价</button>
  </div>
  
  <script src="app.js"></script>
  <script>
    let rating = 5;
    let isAnonymous = true;
    const ratingTexts = ['', '非常差', '差', '一般', '满意', '非常满意'];
    
    function setRating(level, el) {
      rating = level;
      document.querySelectorAll('.rating-star').forEach((star, index) => {
        star.classList.toggle('active', index < level);
      });
      document.getElementById('ratingDesc').textContent = ratingTexts[level];
    }
    
    function checkContent() {
      const content = document.getElementById('reviewContent').value;
      document.getElementById('contentLength').textContent = content.length;
      document.getElementById('submitBtn').disabled = content.length < 10;
    }
    
    function removeImage(el) {
      el.parentElement.remove();
    }
    
    function addImage() {
      alert('上传图片功能开发中');
    }
    
    function toggleAnonymous() {
      const toggle = document.getElementById('anonymousToggle');
      toggle.classList.toggle('active');
      isAnonymous = toggle.classList.contains('active');
    }
    
    function submitReview() {
      const content = document.getElementById('reviewContent').value;
      if (content.length < 10) {
        alert('评价内容至少10个字');
        return;
      }
      if (confirm('确定提交评价吗？')) {
        alert('评价提交成功，感谢您的反馈！');
        setTimeout(() => {
          location.href = 'order.html';
        }, 1500);
      }
    }
  </script>
</body>
</html>
