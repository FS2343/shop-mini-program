<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="通用商城 - 设置">
  <title>设置</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .settings-page{padding-top:100px;padding-bottom:120px}
    .settings-section{background:#fff;margin:20px;border-radius:16px;overflow:hidden}
    .settings-item{display:flex;align-items:center;padding:30px;border-bottom:1px solid #f5f5f5}
    .settings-item:last-child{border-bottom:none}
    .settings-icon{width:48px;height:48px;background:#f5f5f5;border-radius:50%;margin-right:20px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
    .settings-name{flex:1;font-size:28px;color:#333}
    .settings-arrow{font-size:28px;color:#ccc}
    .settings-toggle{width:100px;height:56px;background:#ddd;border-radius:28px;position:relative;cursor:pointer}
    .settings-toggle.active{background:#ff6034}
    .settings-toggle::after{content:'';position:absolute;top:4px;left:4px;width:48px;height:48px;background:#fff;border-radius:50%;transition:all 0.3s}
    .settings-toggle.active::after{left:calc(100px - 52px)}
    .logout-btn{margin:40px 20px;padding:30px;background:#fff;border-radius:16px;text-align:center}
    .logout-text{font-size:32px;color:#fa5151}
  </style>
</head>
<body>
  <div class="page-header"><a href="user.html" class="back-btn">←</a><div class="page-title">设置</div><div style="width:60px"></div></div>
  <div class="settings-page">
    <div class="settings-section">
      <div class="settings-item">
        <div class="settings-icon">🔔</div>
        <div class="settings-name">消息通知</div>
        <div class="settings-toggle active" onclick="toggleSwitch(this)"></div>
      </div>
      <div class="settings-item">
        <div class="settings-icon">🎵</div>
        <div class="settings-name">声音</div>
        <div class="settings-toggle active" onclick="toggleSwitch(this)"></div>
      </div>
      <div class="settings-item">
        <div class="settings-icon">📳</div>
        <div class="settings-name">震动</div>
        <div class="settings-toggle" onclick="toggleSwitch(this)"></div>
      </div>
    </div>
    <div class="settings-section">
      <a href="protocol.html" class="settings-item">
        <div class="settings-icon">📄</div>
        <div class="settings-name">用户协议</div>
        <div class="settings-arrow">></div>
      </a>
      <a href="protocol.html" class="settings-item">
        <div class="settings-icon">🔒</div>
        <div class="settings-name">隐私政策</div>
        <div class="settings-arrow">></div>
      </a>
      <div class="settings-item">
        <div class="settings-icon">📱</div>
        <div class="settings-name">版本更新</div>
        <div style="font-size:24px;color:#999;margin-right:16px">v1.0.0</div>
        <div class="settings-arrow">></div>
      </div>
    </div>
    <div class="logout-btn" onclick="logout()"><div class="logout-text">退出登录</div></div>
  </div>
  <script src="app.js"></script>
  <script>
    function toggleSwitch(el){el.classList.toggle('active')}
    function logout(){if(confirm('确定退出登录吗？')){alert('已退出登录');setTimeout(()=>{location.href='index.html'},1500)}}
  </script>
</body>
</html>
