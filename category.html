<!DOCTYPE html>

        <div class="sub-title">食品生鲜</div>

        <div class="section-title" style="padding:20px 0">热门商品</div>
        <div class="goods-grid" style="background:#fff;padding:20px;border-radius:16px">
          <a href="detail.html?id=1" class="goods-item"><div class="goods-image" style="background:#e8f5e9;height:200px">🍎</div><div class="goods-info"><div class="goods-name">新鲜红富士苹果</div><div class="goods-bottom"><div class="goods-price">¥29.9</div></div></div></a>

  <div class="tabbar">
    <a href="index.html" class="tab-item"><div class="tab-icon">🏠</div><div>首页</div></a>
    <a href="category.html" class="tab-item active"><div class="tab-icon">📋</div><div>分类</div></a>
