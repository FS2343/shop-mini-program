<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="通用商城 - 我的订单">
  <title>我的订单</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .order-page{padding-top:180px;padding-bottom:120px}
    .order-tabs{display:flex;background:#fff;position:fixed;top:100px;left:0;right:0;max-width:750px;z-index:100;border-bottom:1px solid #f5f5f5}
    .order-tab{flex:1;display:flex;align-items:center;justify-content:center;height:80px;font-size:28px;color:#666;position:relative}
    .order-tab.active{color:#ff6034;font-weight:bold}
    .order-tab.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:60px;height:4px;background:#ff6034;border-radius:2px}
    .order-list{padding:20px}
    .order-card{background:#fff;border-radius:16px;margin-bottom:20px;overflow:hidden}
    .order-header{display:flex;justify-content:space-between;align-items:center;padding:24px 30px;border-bottom:1px solid #f5f5f5}
    .order-id{font-size:24px;color:#999}
    .order-status{font-size:28px;color:#ff6034}
    .order-goods{padding:20px 30px}
    .order-goods-item{display:flex;padding:20px 0;border-bottom:1px solid #f5f5f5}
    .order-goods-item:last-child{border-bottom:none}
    .goods-img{width:140px;height:140px;background:#f5f5f5;border-radius:12px;margin-right:20px;display:flex;align-items:center;justify-content:center;font-size:40px;flex-shrink:0}
    .goods-info{flex:1;display:flex;flex-direction:column;justify-content:space-between}
    .goods-title{font-size:28px;color:#333;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .goods-specs{font-size:24px;color:#999;margin-top:8px}
    .goods-row{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
    .goods-price{font-size:28px;color:#333}
    .goods-num{font-size:26px;color:#999}
    .order-footer{padding:20px 30px;border-top:1px solid #f5f5f5;display:flex;flex-direction:column;align-items:flex-end}
    .order-time{font-size:22px;color:#999;margin-bottom:16px}
    .order-action{display:flex;align-items:center}
    .action-total{margin-right:30px}
    .action-total-label{font-size:26px;color:#666}
    .action-total-price{font-size:32px;font-weight:bold;color:#333}
    .action-btns{display:flex}
    .action-btn{width:140px;height:56px;border-radius:28px;font-size:26px;display:flex;align-items:center;justify-content:center;margin-left:16px}
    .action-btn.cancel{background:#fff;color:#666;border:1px solid #ddd}
    .action-btn.pay{background:#ff6034;color:#fff}
    .action-btn.confirm{background:#ff6034;color:#fff}
  </style>
</head>
<body>
  <div class="page-header" style="background:#fff"><a href="user.html" class="back-btn">←</a><div class="page-title">我的订单</div><div style="width:60px"></div></div>
  <div class="order-tabs">
    <div class="order-tab active" onclick="switchTab(this,0)">全部</div>
    <div class="order-tab" onclick="switchTab(this,1)">待付款</div>
    <div class="order-tab" onclick="switchTab(this,2)">待发货</div>
    <div class="order-tab" onclick="switchTab(this,3)">待收货</div>
    <div class="order-tab" onclick="switchTab(this,4)">已完成</div>
  </div>
  <div class="order-page">
    <div class="order-list">
      <div class="order-card">
        <div class="order-header"><span class="order-id">订单号: ORDER20240517001</span><span class="order-status">待付款</span></div>
        <div class="order-goods">
          <div class="order-goods-item">
            <div class="goods-img">🍎</div>
            <div class="goods-info">
              <div class="goods-title">新鲜红富士苹果 5斤装</div>
              <div class="goods-specs">5斤装</div>
              <div class="goods-row"><div class="goods-price">¥29.9</div><div class="goods-num">x1</div></div>
            </div>
          </div>
        </div>
        <div class="order-footer">
          <div class="order-time">2024-05-17 10:30:00</div>
          <div class="order-action">
            <div class="action-total"><span class="action-total-label">合计:</span><span class="action-total-price">¥29.9</span></div>
            <div class="action-btns">
              <div class="action-btn cancel" onclick="showToast('取消订单')">取消订单</div>
              <div class="action-btn pay" onclick="showToast('去支付')">去支付</div>
            </div>
          </div>
        </div>
      </div>
      <div class="order-card">
        <div class="order-header"><span class="order-id">订单号: ORDER20240516002</span><span class="order-status">待发货</span></div>
        <div class="order-goods">
          <div class="order-goods-item">
            <div class="goods-img">📱</div>
            <div class="goods-info">
              <div class="goods-title">iPhone 15 Pro Max 256G</div>
              <div class="goods-specs">原色钛金属</div>
              <div class="goods-row"><div class="goods-price">¥8999</div><div class="goods-num">x1</div></div>
            </div>
          </div>
        </div>
        <div class="order-footer">
          <div class="order-time">2024-05-16 15:20:00</div>
          <div class="order-action">
            <div class="action-total"><span class="action-total-label">合计:</span><span class="action-total-price">¥8999</span></div>
            <div class="action-btns"><div class="action-btn cancel" onclick="showToast('提醒发货')">提醒发货</div></div>
          </div>
        </div>
      </div>
      <div class="order-card">
        <div class="order-header"><span class="order-id">订单号: ORDER20240515003</span><span class="order-status">待收货</span></div>
        <div class="order-goods">
          <div class="order-goods-item">
            <div class="goods-img">👕</div>
            <div class="goods-info">
              <div class="goods-title">女士纯棉T恤 简约百搭</div>
              <div class="goods-specs">白色 M码</div>
              <div class="goods-row"><div class="goods-price">¥59</div><div class="goods-num">x1</div></div>
            </div>
          </div>
        </div>
        <div class="order-footer">
          <div class="order-time">2024-05-15 09:00:00</div>
          <div class="order-action">
            <div class="action-total"><span class="action-total-label">合计:</span><span class="action-total-price">¥59</span></div>
            <div class="action-btns"><div class="action-btn confirm" onclick="showToast('确认收货')">确认收货</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
  <script>
    function switchTab(el,index){document.querySelectorAll('.order-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');showToast('切换到Tab '+(index===0?'全部':index===1?'待付款':index===2?'待发货':index===3?'待收货':'已完成'))}
  </script>
</body>
</html>
