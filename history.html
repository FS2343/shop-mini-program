<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="通用商城 - 浏览历史">
  <title>浏览历史</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .history-page{padding-top:100px;padding-bottom:120px}
    .history-list{padding:20px}
    .history-item{display:flex;background:#fff;border-radius:16px;padding:30px;margin-bottom:20px}
    .history-img{width:180px;height:180px;background:#f5f5f5;border-radius:12px;margin-right:20px;display:flex;align-items:center;justify-content:center;font-size:60px;flex-shrink:0}
    .history-info{flex:1;display:flex;flex-direction:column;justify-content:space-between}
    .history-name{font-size:28px;color:#333;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .history-bottom{display:flex;justify-content:space-between;align-items:center}
    .history-price{font-size:32px;color:#ff6034;font-weight:bold}
    .history-time{font-size:22px;color:#999}
    .clear-btn{position:fixed;top:calc(100px + 20px);right:30px;z-index:100;font-size:24px;color:#999}
  </style>
</head>
<body>
  <div class="page-header"><a href="user.html" class="back-btn">←</a><div class="page-title">浏览历史</div><div style="width:60px"></div></div>
  <span class="clear-btn" onclick="clearHistory()">清空</span>
  <div class="history-page">
    <div class="history-list">
      <div class="history-item">
        <a href="detail.html?id=1" class="history-img">🍎</a>
        <div class="history-info">
          <a href="detail.html?id=1" class="history-name">新鲜红富士苹果 5斤装</a>
          <div class="history-bottom">
            <div class="history-price">¥29.9</div>
            <div class="history-time">今天 10:30</div>
          </div>
        </div>
      </div>
      <div class="history-item">
        <a href="detail.html?id=3" class="history-img">📱</a>
        <div class="history-info">
          <a href="detail.html?id=3" class="history-name">iPhone 15 Pro Max 256G</a>
          <div class="history-bottom">
            <div class="history-price">¥8999</div>
            <div class="history-time">今天 09:15</div>
          </div>
        </div>
      </div>
      <div class="history-item">
        <a href="detail.html?id=5" class="history-img">💄</a>
        <div class="history-info">
          <a href="detail.html?id=5" class="history-name">玻尿酸保湿面膜 10片装</a>
          <div class="history-bottom">
            <div class="history-price">¥39.9</div>
            <div class="history-time">昨天 18:20</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
  <script>
    function clearHistory(){if(confirm('确定清空所有浏览记录吗？')){document.querySelector('.history-list').innerHTML='<div style="text-align:center;padding:200px 0;font-size:28px;color:#999">暂无浏览记录</div>';document.querySelector('.clear-btn').style.display='none'}}
  </script>
</body>
</html>
