<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="通用商城 - 商品评价">
  <title>商品评价</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .review-page { padding-top: 100rpx; padding-bottom: 120rpx; }
    .review-tabs { display: flex; background: #fff; position: fixed; top: 88rpx; left: 0; right: 0; max-width: 750rpx; z-index: 99; border-bottom: 1rpx solid #eee; }
    .review-tab { flex: 1; display: flex; align-items: center; justify-content: center; height: 80rpx; font-size: 26rpx; color: #666; position: relative; }
    .review-tab.active { color: #ff6034; font-weight: bold; }
    .review-tab.active::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 50rpx; height: 4rpx; background: #ff6034; border-radius: 2rpx; }
    .review-tab .count { font-size: 20rpx; margin-left: 8rpx; }
    .review-list { padding: 20rpx; }
    .review-item { background: #fff; border-radius: 16rpx; padding: 30rpx; margin-bottom: 20rpx; }
    .review-header { display: flex; align-items: center; margin-bottom: 20rpx; }
    .review-avatar { width: 64rpx; height: 64rpx; background: #f5f5f5; border-radius: 50%; margin-right: 16rpx; display: flex; align-items: center; justify-content: center; font-size: 32rpx; }
    .review-user { flex: 1; }
    .review-name { font-size: 26rpx; color: #333; font-weight: bold; margin-bottom: 8rpx; }
    .review-time { font-size: 22rpx; color: #999; }
    .review-stars { display: flex; margin-bottom: 16rpx; }
    .review-star { font-size: 28rpx; color: #ccc; margin-right: 4rpx; }
    .review-star.active { color: #ffcc00; }
    .review-content { font-size: 26rpx; color: #333; line-height: 1.6; margin-bottom: 16rpx; }
    .review-spec { font-size: 22rpx; color: #999; margin-bottom: 16rpx; }
    .review-images { display: flex; flex-wrap: wrap; }
    .review-image { width: 160rpx; height: 160rpx; background: #f5f5f5; border-radius: 8rpx; margin-right: 12rpx; margin-bottom: 12rpx; display: flex; align-items: center; justify-content: center; font-size: 60rpx; }
    .review-action { display: flex; justify-content: flex-end; margin-top: 16rpx; }
    .action-btn { padding: 8rpx 24rpx; background: #fff; color: #666; border: 1rpx solid #ddd; border-radius: 24rpx; font-size: 22rpx; margin-left: 16rpx; }
    .action-btn.like { color: #ff6034; border-color: #ff6034; }
    
    /* 写评价页 */
    .write-review { background: #fff; padding: 20rpx; }
    .write-header { display: flex; margin-bottom: 30rpx; }
    .write-goods-img { width: 160rpx; height: 160rpx; background: #f5f5f5; border-radius: 12rpx; margin-right: 20rpx; display: flex; align-items: center; justify-content: center; font-size: 60rpx; flex-shrink: 0; }
    .write-goods-info { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
    .write-goods-name { font-size: 26rpx; color: #333; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .write-goods-spec { font-size: 22rpx; color: #999; margin-top: 8rpx; }
    .write-rating { padding: 30rpx; border-top: 1rpx solid #f5f5f5; }
    .rating-label { font-size: 26rpx; color: #333; margin-bottom: 16rpx; }
    .rating-stars { display: flex; }
    .rating-star { font-size: 48rpx; color: #ccc; margin-right: 16rpx; cursor: pointer; }
    .rating-star.active { color: #ffcc00; }
    .rating-text { font-size: 24rpx; color: #999; margin-left: 20rpx; }
    .write-content { padding: 30rpx; }
    .content-textarea { width: 100%; height: 240rpx; background: #f5f5f5; border: none; border-radius: 16rpx; padding: 24rpx; font-size: 26rpx; color: #333; resize: none; box-sizing: border-box; }
    .content-tip { font-size: 22rpx; color: #999; margin-top: 12rpx; }
    .write-images { padding: 0 30rpx 30rpx; }
    .images-label { font-size: 26rpx; color: #333; margin-bottom: 16rpx; }
    .images-list { display: flex; flex-wrap: wrap; }
    .images-item { width: 160rpx; height: 160rpx; background: #f5f5f5; border-radius: 12rpx; margin-right: 16rpx; margin-bottom: 16rpx; display: flex; align-items: center; justify-content: center; font-size: 60rpx; position: relative; }
    .images-item.add { border: 2rpx dashed #ddd; background: none; }
    .images-item .remove { position: absolute; top: -12rpx; right: -12rpx; width: 36rpx; height: 36rpx; background: rgba(0,0,0,0.5); color: #fff; border-radius: 50%; font-size: 24rpx; display: flex; align-items: center; justify-content: center; }
    .submit-review { position: fixed; bottom: 0; left: 0; right: 0; max-width: 750rpx; padding: 20rpx 30rpx; padding-bottom: calc(20rpx + env(safe-area-inset-bottom)); background: #fff; box-shadow: 0 -2rpx 10rpx rgba(0,0,0,0.05); }
    .submit-btn { width: 100%; height: 88rpx; background: linear-gradient(135deg, #ff6034, #ff8a34); color: #fff; border: none; border-radius: 44rpx; font-size: 32rpx; }
  </style>
</head>
<body>
  <div class="page-header"><a href="order.html" class="back-btn">←</a><div class="page-title">商品评价</div><a href="write-review.html" class="back-btn" style="color:#ff6034;font-size:26rpx">写评价</a></div>
  
  <div class="review-tabs">
    <div class="review-tab active" onclick="switchReviewTab(this, 'all')">全部<span class="count">(126)</span></div>
    <div class="review-tab" onclick="switchReviewTab(this, 'good')">好评<span class="count">(100)</span></div>
    <div class="review-tab" onclick="switchReviewTab(this, 'middle')">中评<span class="count">(20)</span></div>
    <div class="review-tab" onclick="switchReviewTab(this, 'bad')">差评<span class="count">(6)</span></div>
    <div class="review-tab" onclick="switchReviewTab(this, 'image')">有图<span class="count">(45)</span></div>
  </div>
  
  <div class="review-page">
    <div class="review-list" id="reviewList">
      <!-- 评价项1 -->
      <div class="review-item">
        <div class="review-header">
          <div class="review-avatar">👤</div>
          <div class="review-user">
            <div class="review-name">用户8382</div>
            <div class="review-time">2024-05-15</div>
          </div>
        </div>
        <div class="review-stars">
          <span class="review-star active">⭐</span>
          <span class="review-star active">⭐</span>
          <span class="review-star active">⭐</span>
          <span class="review-star active">⭐</span>
          <span class="review-star active">⭐</span>
        </div>
        <div class="review-content">质量非常好，包装也很精美，物流超快，第二天就到了。客服态度也很好，会回购的！</div>
        <div class="review-spec">规格: 5斤装</div>
        <div class="review-images">
          <div class="review-image">📷</div>
          <div class="review-image">📷</div>
        </div>
        <div class="review-action">
          <span class="action-btn like" onclick="this.classList.toggle('active')">❤️ 赞(23)</span>
          <span class="action-btn" onclick="alert('回复功能开发中')">回复</span>
        </div>
      </div>
      
      <!-- 评价项2 -->
      <div class="review-item">
        <div class="review-header">
          <div class="review-avatar">👤</div>
          <div class="review-user">
            <div class="review-name">用户5621</div>
            <div class="review-time">2024-05-14</div>
          </div>
        </div>
        <div class="review-stars">
          <span class="review-star active">⭐</span>
          <span class="review-star active">⭐</span>
          <span class="review-star active">⭐</span>
          <span class="review-star active">⭐</span>
          <span class="review-star">⭐</span>
        </div>
        <div class="review-content">整体不错，就是发货稍微慢了点。</div>
        <div class="review-spec">规格: 5斤装</div>
        <div class="review-action">
          <span class="action-btn" onclick="this.classList.toggle('like')">❤️ 赞(5)</span>
          <span class="action-btn" onclick="alert('回复功能开发中')">回复</span>
        </div>
      </div>
      
      <!-- 评价项3 -->
      <div class="review-item">
        <div class="review-header">
          <div class="review-avatar">👤</div>
          <div class="review-user">
            <div class="review-name">用户9234</div>
            <div class="review-time">2024-05-13</div>
          </div>
        </div>
        <div class="review-stars">
          <span class="review-star active">⭐</span>
          <span class="review-star active">⭐</span>
          <span class="review-star active">⭐</span>
          <span class="review-star active">⭐</span>
          <span class="review-star active">⭐</span>
        </div>
        <div class="review-content">非常好吃的水果，新鲜又甜，价格也实惠。</div>
        <div class="review-spec">规格: 5斤装</div>
        <div class="review-action">
          <span class="action-btn" onclick="this.classList.toggle('like')">❤️ 赞(12)</span>
          <span class="action-btn" onclick="alert('回复功能开发中')">回复</span>
        </div>
      </div>
    </div>
  </div>
  
  <script src="app.js"></script>
  <script>
    function switchReviewTab(el, type) {
      document.querySelectorAll('.review-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      alert('切换到' + (type === 'all' ? '全部' : type === 'good' ? '好评' : type === 'middle' ? '中评' : type === 'bad' ? '差评' : '有图') + '评价');
    }
  </script>
</body>
</html>
